databases:
  - name: pattern-pipeline-db
    plan: free

services:
  - type: web
    name: pattern-pipeline
    runtime: docker
    plan: free
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: pattern-pipeline-db
          property: connectionString
      - key: AI_PROVIDER
        value: auto
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
