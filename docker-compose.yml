services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DJANGO_SECURE_SSL_REDIRECT: "false"
      DATABASE_URL: "sqlite:////app/data/db.sqlite3"
    volumes:
      - app-data:/app/data

volumes:
  app-data:
